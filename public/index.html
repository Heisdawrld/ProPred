<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PROPRED PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root { --bg: #08080f; --bg2: #0d0d1a; --card: #14142a; --border: #1f1f40; --accent: #5b6ef5; --text: #f0f0ff; --gold: #ffcf40; --dim: #5a5a8a; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 60px; }
nav { background: var(--card); padding: 12px 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.logo { font-weight: 900; color: var(--accent); font-size: 1.1rem; }
.search-box { padding: 10px; background: var(--bg); }
#searchInput { width: 100%; background: var(--card); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; font-size: 0.85rem; }
#fxList { display: flex; flex-direction: column; gap: 2px; padding: 5px; }
.league-group { background: var(--bg2); margin-bottom: 4px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
.league-header { background: var(--card); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-left: 3px solid var(--accent); }
.lh-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
.league-group.collapsed .league-matches { display: none; }
.fs-row { display: grid; grid-template-columns: 55px 1fr 60px 1fr 30px; align-items: center; padding: 12px 10px; background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
.fs-time { font-size: 0.65rem; color: var(--dim); font-weight: 700; text-align: center; }
.fs-team { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fs-team.home { text-align: right; padding-right: 8px; }
.fs-team.away { text-align: left; padding-left: 8px; }
.fs-score { background: #000; color: var(--gold); font-weight: 800; text-align: center; padding: 3px 0; border-radius: 3px; font-size: 0.85rem; }
.loading { padding: 50px; text-align: center; color: var(--dim); font-size: 0.8rem; }
</style>
</head>
<body>
<nav><div class="logo">PROPRED PRO</div></nav>
<div class="search-box"><input type="text" id="searchInput" placeholder="Search teams or leagues..." oninput="render()"></div>
<div id="fxList"><div class="loading">Fetching Matches...</div></div>
<script>
let allFx = [];
const MAJORS = ['premier league', 'champions league', 'la liga', 'bundesliga', 'serie a', 'ligue 1'];

async function init() {
  try {
    const res = await fetch('/api/fixtures');
    const data = await res.json();
    allFx = data.fixtures || []; 
    if (allFx.length === 0) { document.getElementById('fxList').innerHTML = '<div class="loading">No matches found.</div>'; return; }
    render();
  } catch (e) { document.getElementById('fxList').innerHTML = '<div class="loading">Server Error</div>'; }
}

function render() {
  const container = document.getElementById('fxList');
  const query = document.getElementById('searchInput').value.toLowerCase();
  const groups = {};
  
  // Filter and Group
  allFx.filter(f => 
    (f.homeTeam || '').toLowerCase().includes(query) || 
    (f.awayTeam || '').toLowerCase().includes(query) || 
    (f.league || '').toLowerCase().includes(query)
  ).forEach(f => {
    const lName = f.league || 'Other Leagues';
    if (!groups[lName]) groups[lName] = [];
    groups[lName].push(f);
  });

  const sortedLeagues = Object.keys(groups).sort((a, b) => {
    const aM = MAJORS.some(l => a.toLowerCase().includes(l));
    const bM = MAJORS.some(l => b.toLowerCase().includes(l));
    return bM - aM || a.localeCompare(b);
  });

  container.innerHTML = sortedLeagues.map(l => {
    const isMajor = MAJORS.some(m => l.toLowerCase().includes(m)) || query.length > 0;
    return `
    <div class="league-group ${isMajor ? '' : 'collapsed'}">
      <div class="league-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="lh-title">🏆 ${l}</div>
        <div style="font-size:0.6rem; color:var(--dim)">▼</div>
      </div>
      <div class="league-matches">
        ${groups[l].map(f => {
          const score = (f.homeGoals !== null) ? \`\${f.homeGoals}-\${f.awayGoals}\` : 'v';
          const time = f.date ? f.date.split(' ')[1] || 'TBD' : 'TBD';
          return \`
          <div class="fs-row" onclick="alert('Analysis loading...')">
            <div class="fs-time">\${time}</div>
            <div class="fs-team home">\${f.homeTeam}</div>
            <div class="fs-score">\${score}</div>
            <div class="fs-team away">\${f.awayTeam}</div>
            <div style="text-align:center; color:#222">☆</div>
          </div>\`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}
init();
</script>
</body>
</html>
