<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PROPRED</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* --- CORE STYLES --- */
:root {
  --bg: #08080f; --bg2: #0d0d1a; --card: #14142a;
  --border: #1f1f40; --accent: #5b6ef5; --text: #f0f0ff;
  --gold: #ffcf40; --dim: #5a5a8a; --font: 'Inter', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; overflow-x: hidden; }

/* --- FLASHSCORE LAYOUT --- */
nav { background: var(--card); padding: 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
.logo { font-weight: 900; letter-spacing: -1px; font-size: 1.2rem; color: var(--accent); }

#fxList { display: flex; flex-direction: column; gap: 2px; padding: 0.5rem; }

.league-group { background: var(--bg2); border-bottom: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
.league-header {
  background: var(--card); padding: 10px 15px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; border-left: 3px solid var(--accent);
}
.lh-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text); display: flex; align-items: center; gap: 8px; }
.lh-chevron { font-size: 0.6rem; color: var(--dim); transition: transform 0.2s; }
.league-group.collapsed .lh-chevron { transform: rotate(-90deg); }
.league-group.collapsed .league-matches { display: none; }

.fs-row {
  display: grid; grid-template-columns: 60px 1fr 60px 1fr 40px;
  align-items: center; padding: 12px 15px; background: var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer;
}
.fs-row:hover { background: var(--card); }
.fs-time { font-size: 0.7rem; color: var(--dim); font-weight: 700; text-align: center; }
.fs-team { font-size: 0.85rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.fs-team.home { text-align: right; padding-right: 10px; }
.fs-team.away { text-align: left; padding-left: 10px; }
.fs-score {
  background: #000; color: var(--gold); font-family: var(--mono);
  font-weight: 800; text-align: center; padding: 4px 0; border-radius: 4px; font-size: 0.9rem;
}

/* Modal / Analysis Styles */
#modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; padding: 1rem; overflow-y: auto; backdrop-filter: blur(8px); }
.modal-content { background: var(--bg2); width: 100%; max-width: 600px; margin: 0 auto; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); position: relative; }
.close-btn { position: absolute; right: 1rem; top: 1rem; font-size: 1.5rem; cursor: pointer; color: var(--dim); }

/* Loading State */
.loading { padding: 40px; text-align: center; color: var(--dim); font-weight: 600; }
</style>
</head>
<body>

<nav>
  <div class="logo">PROPRED <span style="font-size:0.6rem; color:var(--dim); font-weight:400;">v4.0</span></div>
  <div style="font-size:0.7rem; color:var(--dim);">2026 Prediction Engine</div>
</nav>

<div id="fxList"><div class="loading">Fetching fixtures...</div></div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" id="modalBody"></div>
</div>

<script>
let allFx = [];
const MAJOR_LEAGUES = [
  'premier league', 'champions league', 'europa league', 'la liga', 
  'bundesliga', 'serie a', 'ligue 1', 'eredivisie', 'mls', 'brasileirao'
];

async function init() {
  try {
    const res = await fetch('/api/fixtures');
    allFx = await res.json();
    render();
  } catch (e) {
    document.getElementById('fxList').innerHTML = '<div class="loading">Error loading data</div>';
  }
}

function render() {
  const container = document.getElementById('fxList');
  if (!allFx.length) {
    container.innerHTML = '<div class="loading">No matches found</div>';
    return;
  }

  // Group by league
  const groups = {};
  allFx.forEach(f => {
    if (!groups[f.league]) groups[f.league] = [];
    groups[f.league].push(f);
  });

  // Sort: Majors top, then Alpha
  const html = Object.keys(groups).sort((a, b) => {
    const aL = a.toLowerCase(); const bL = b.toLowerCase();
    const aIdx = MAJOR_LEAGUES.findIndex(l => aL.includes(l));
    const bIdx = MAJOR_LEAGUES.findIndex(l => bL.includes(l));
    if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
    if (aIdx !== -1) return -1;
    if (bIdx !== -1) return 1;
    return a.localeCompare(b);
  }).map(league => {
    const isMajor = MAJOR_LEAGUES.some(l => league.toLowerCase().includes(l));
    return `
    <div class="league-group ${isMajor ? '' : 'collapsed'}">
      <div class="league-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="lh-title">🏆 ${league}</div>
        <div class="lh-chevron">▼</div>
      </div>
      <div class="league-matches">
        ${groups[league].map(f => renderRow(f)).join('')}
      </div>
    </div>`;
  }).join('');

  container.innerHTML = html;
}

function renderRow(f) {
  const time = f.date ? new Date(f.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
  const score = (f.homeGoals !== null && f.homeGoals !== undefined) ? `${f.homeGoals}-${f.awayGoals}` : 'v';
  
  return `
    <div class="fs-row" onclick="openMatch('${f.id}')">
      <div class="fs-time">${time}</div>
      <div class="fs-team home">${f.homeTeam}</div>
      <div class="fs-score">${score}</div>
      <div class="fs-team away">${f.awayTeam}</div>
      <div style="text-align:center;color:var(--dim);font-size:0.8rem">☆</div>
    </div>`;
}

async function openMatch(id) {
  const modal = document.getElementById('modal');
  const body = document.getElementById('modalBody');
  modal.style.display = 'block';
  body.innerHTML = '<div class="loading">Analyzing match data...</div>';

  try {
    const res = await fetch(`/api/analysis/${id}`);
    const data = await res.json();
    
    // Simple analysis display - can be expanded as needed
    body.innerHTML = `
      <div class="modal-header">
        <div class="close-btn" onclick="closeModal()">×</div>
        <h2 style="font-size:1rem; margin-bottom:0.5rem;">${data.home_team} vs ${data.away_team}</h2>
        <div style="font-size:0.7rem; color:var(--dim)">${data.league}</div>
      </div>
      <div style="padding:1.5rem;">
        <div style="background:rgba(255,207,64,0.1); padding:1rem; border-radius:8px; border:1px solid var(--gold); margin-bottom:1rem;">
          <div style="font-size:0.6rem; text-transform:uppercase; color:var(--gold); font-weight:800;">Top Tip</div>
          <div style="font-size:1.1rem; font-weight:800;">${data.tip || 'No Tip Available'}</div>
        </div>
        <p style="font-size:0.85rem; line-height:1.6; color:var(--text2); white-space:pre-wrap;">${data.analysis || 'Analysis pending...'}</p>
      </div>
    `;
  } catch (e) {
    body.innerHTML = '<div class="loading">Error fetching analysis</div>';
  }
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

init();
</script>
</body>
</html>
